<!DOCTYPE html>
<html>
<head>
  <title>Mini Game UI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #shop {
      display: none;
      margin-top: 20px;
      border: 2px solid white;
      padding: 20px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1 id="message">Yo bro 👀 got sum for you</h1>

<button id="shopBtn">🛒 Open Shop</button>

<div id="shop">
  <h2>Shop</h2>
  <p>🔥 Sword - 100 coins</p>
  <p>🛡 Shield - 80 coins</p>
  <p>💊 Potion - 20 coins</p>
</div>

<script src="game.js"></script>

</body>
</html>
